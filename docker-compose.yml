services:
  medkit:
    build: .
    container_name: medkit
    ports:
      - "3000:3000"
    volumes:
      - medkit-data:/data
    environment:
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_BASE_URL=${AI_BASE_URL:-https://api.openai.com}
      - AI_MODEL=${AI_MODEL:-gpt-4o-mini}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
    restart: unless-stopped

volumes:
  medkit-data:
